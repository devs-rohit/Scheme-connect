<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheme Connect | Official Govt Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
    <style>
        /* --- UI THEME & RESPONSIVENESS --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(to right, #4facfe, #00f2fe); 
            text-align: center; color: white; margin: 0; padding: 10px; min-height: 100vh;
        }
        
        .container {
            background: white; color: black; padding: 30px; margin: 20px auto; 
            width: 95%; max-width: 550px; 
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); box-sizing: border-box; 
        }

        h2 { margin-bottom: 20px; font-size: 28px; color: #333; font-weight: 800; letter-spacing: -0.5px;}

        /* Horizontal Expansion of Input Boxes */
        input, select {
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 10px; 
            border: 1px solid #ddd; 
            font-size: 16px; 
            box-sizing: border-box; 
            background-color: #fcfcfc;
            transition: 0.3s;
        }
        
        input:focus, select:focus {
            border-color: #4facfe;
            outline: none;
            box-shadow: 0 0 8px rgba(79, 172, 254, 0.2);
        }

        button {
            width: 100%; padding: 16px; margin-top: 20px; border: none; border-radius: 10px; 
            background: #4facfe; color: white; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
            transition: 0.3s;
        }
        
        button:hover { background: #00d2ff; transform: translateY(-2px); }

        /* --- HORIZONTAL SCHEME CARDS --- */
        #result { margin-top: 25px; max-height: 600px; overflow-y: auto; padding-bottom: 20px; }

        .scheme-list {
            display: flex; flex-direction: column; gap: 15px; text-align: left;
        }

        .scheme-card {
            background: #ffffff; padding: 18px; border-radius: 15px; border: 1px solid #eee;
            box-shadow: 0 5px 15px rgba(0,0,0,0.06); transition: 0.2s;
        }
        .scheme-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }

        .scheme-card b { color: #4facfe; font-size: 18px; display: block; margin-bottom: 12px; border-bottom: 2px solid #f0f0f0; padding-bottom: 6px;}
        
        .info-box { font-size: 12px; color: #444; line-height: 1.6; margin-bottom: 12px; }
        .info-box i { display: block; margin-bottom: 4px; color: #222; font-weight: 700; font-style: normal; text-transform: uppercase; font-size: 10.5px; letter-spacing: 0.5px;}

        .scheme-card a { 
            display: inline-block; color: white; background: #4caf50; text-decoration: none; 
            font-size: 12px; font-weight: bold; text-align: center; padding: 10px 20px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #00f2fe 0%, #4facfe 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease-out, visibility 0.8s;
        }
        .logo-container { position: relative; width: 120px; height: 120px; display: flex; justify-content: center; align-items: center; }
        .orbit { position: absolute; border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 50%; animation: rotate 3s linear infinite; }
        .orbit-1 { width: 140px; height: 140px; border-top-color: white; animation-duration: 1.5s; }
        .orbit-2 { width: 180px; height: 180px; border-bottom-color: white; animation-duration: 3s; }
        .splash-text { margin-top: 50px; font-size: 28px; font-weight: bold; letter-spacing: 4px; color: white; }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .hidden { opacity: 0; visibility: hidden; }

        /* --- FACE SCANNER UI --- */
        .video-wrapper { position: relative; display: none; margin-top: 20px; overflow: hidden; border-radius: 15px; border: 4px solid #4facfe; background: #000; }
        video { width: 100%; display: block; transform: scaleX(-1); }
        
        .face-guide {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 180px; height: 240px; border: 2px dashed rgba(255,255,255,0.7);
            border-radius: 50%; box-shadow: 0 0 0 1000px rgba(0,0,0,0.6);
            pointer-events: none;
        }
        .scan-line {
            position: absolute; width: 100%; height: 2px; background: #00f2fe;
            top: 0; left: 0; box-shadow: 0 0 15px #00f2fe;
            animation: moveScan 2.5s linear infinite;
        }
        @keyframes moveScan { 0% { top: 0%; } 100% { top: 100%; } }

        #success-animation { display: none; margin: 15px auto; width: 60px; height: 60px; }
        .check-icon { 
            width: 60px; height: 60px; border-radius: 50%; border: 4px solid #4caf50; 
            position: relative; display: flex; justify-content: center; align-items: center; margin: 0 auto;
        }
        .check-icon::after {
            content: ''; position: absolute; top: 40%; left: 50%; width: 12px; height: 24px;
            border-right: 4px solid #4caf50; border-bottom: 4px solid #4caf50;
            transform: translate(-50%, -60%) rotate(45deg); animation: checkmark 0.5s ease forwards;
        }
        @keyframes checkmark { 0% { height: 0; width: 0; opacity: 0; } 100% { height: 24px; width: 12px; opacity: 1; } }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="logo-container">
        <div class="orbit orbit-1"></div>
        <div class="orbit orbit-2"></div>
        <svg width="60" height="60" fill="white" viewBox="0 0 16 16">
            <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/><path d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/>
        </svg>
    </div>
    <div class="splash-text">Scheme Connect</div>
    <p style="color:white; opacity: 0.8; margin-top: 10px;">Linking Citizens to Benefits</p>
</div>

<div class="container">
    <h2>Scheme Connect</h2>
    <input id="name" placeholder="Full Name">
    <input id="aadhaar" placeholder="Aadhaar (12 digit)" maxlength="12" inputmode="numeric">
    <input id="age" type="number" placeholder="Age" oninput="if(this.value.length > 3) this.value = this.value.slice(0, 3);">
    <select id="gender"><option value="Male">Male</option><option value="Female">Female</option></select>
    <select id="income">
        <option value="none">No Income</option>
        <option value="200000">Below 2 Lakh (EWS)</option>
        <option value="500000">Below 5 Lakh</option>
    </select>
    <input id="occupation" placeholder="Occupation (farmer, student, business)">
    <button onclick="startVerification()">Verify & Find Schemes</button>
    
    <div class="video-wrapper" id="videoWrapper">
        <video id="video" autoplay playsinline></video>
        <div class="face-guide"><div class="scan-line"></div></div>
        <p style="position: absolute; bottom: 10px; width: 100%; color: white; font-size: 11px; font-weight: bold; letter-spacing: 1px;">ALIGN EXACTLY 1 PERSON</p>
    </div>

    <div id="success-animation"><div class="check-icon"></div><p style="color: #4caf50; font-weight: bold; margin-top: 10px;">Face Verified!</p></div>
    <div id="result"></div>
</div>

<script>
    let faceCount = 0;
    let faceDetection;

    window.addEventListener('load', () => {
        setTimeout(() => { document.getElementById('splash-screen').classList.add('hidden'); }, 3000); 
        
        faceDetection = new FaceDetection({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
        });

        faceDetection.setOptions({
            model: 'short',
            minDetectionConfidence: 0.75
        });

        faceDetection.onResults((results) => {
            if (results.detections) {
                faceCount = results.detections.length;
            } else {
                faceCount = 0;
            }
        });
    });

    function startVerification() {
        const aadhaar = document.getElementById("aadhaar").value;
        const ageVal = document.getElementById("age").value;
        const age = parseInt(ageVal);
        
        if(aadhaar.length !== 12 || isNaN(aadhaar)) { alert("Enter 12-digit Aadhaar"); return; }
        
        // Logical check: Direct "Not Eligible" message if age is not between 18 and 120
        if(!ageVal || age < 18 || age > 120) { 
            document.getElementById("result").innerHTML ="<span style='color:red; font-weight:bold;'>Not Eligible.</span>"; 
            return; 
        }
        
        const wrapper = document.getElementById("videoWrapper");
        const video = document.getElementById("video");
        const successAnim = document.getElementById("success-animation");
        const resultDiv = document.getElementById("result");
        
        wrapper.style.display = "block";
        successAnim.style.display = "none";
        resultDiv.innerHTML = "<i>Authenticating...</i>";
        
        faceCount = 0; // Reset initial count

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(stream => {
            video.srcObject = stream;
            
            const interval = setInterval(async () => {
                if (video.videoWidth > 0 && video.videoHeight > 0) {
                    await faceDetection.send({ image: video });
                }
            }, 500);

            setTimeout(() => {
                clearInterval(interval);
                stream.getTracks().forEach(track => track.stop());
                wrapper.style.display = "none";

                if (faceCount === 1) {
                    successAnim.style.display = "block";
                    resultDiv.innerHTML = "";
                    setTimeout(() => {
                        successAnim.style.display = "none";
                        showSchemes();
                    }, 1800);
                } else if (faceCount > 1) {
                    resultDiv.innerHTML = "<span style='color:red; font-weight:bold;'>Verification Failed: Multiple faces detected!</span>";
                } else {
                    resultDiv.innerHTML = "<span style='color:red; font-weight:bold;'>Verification Failed: No face detected.</span>";
                }
            }, 4000);
        }).catch(() => { showSchemes(); });
    }

    function showSchemes() {
        const age = parseInt(document.getElementById("age").value);
        const income = document.getElementById("income").value === "none" ? 0 : parseInt(document.getElementById("income").value);
        const gender = document.getElementById("gender").value;
        const occ = document.getElementById("occupation").value.toLowerCase();
        
        let eligible = [];
        const db = [
            { 
                name:"PM Kisan Nidhi (₹6000/yr)", 
                link:"https://pmkisan.gov.in/", 
                steps:"Aadhaar eKYC ➜ Land Records Seeding ➜ Check Installment Status",
                eligibility: "Indian Farmer ➜ Owns Cultivable Land ➜ eKYC Verified",
                trigger: occ.includes("farmer") 
            },
            { 
                name:"PM Fasal Bima (Crop Insurance)", 
                link:"https://pmfby.gov.in/", 
                steps:"Select Crop/Season ➜ Fill Policy Form ➜ Pay Small Premium",
                eligibility: "All Farmers (Loanee/Non-loanee) ➜ Notified Crops only",
                trigger: occ.includes("farmer") 
            },
            { 
                name:"Ayushman Bharat (₹5 Lakh Health Cover)", 
                link:"https://pmjay.gov.in/", 
                steps:"Search Name in SECC List ➜ Visit KYC Center ➜ Get Golden Card",
                eligibility: "Poor/Vulnerable Family (as per SECC) ➜ Below 2L Income",
                trigger: income <= 200000 
            },
            { 
                name:"PM Awas Yojana (Housing Subsidy)", 
                link:"https://pmaymis.gov.in/", 
                steps:"Online Registration ➜ Verification ➜ Fund Credit ➜ Home Construction",
                eligibility: "Puccka House not owned anywhere ➜ Low Income/EWS",
                trigger: income <= 500000 
            },
            { 
                name:"NSP Scholarship (For Students)", 
                link:"https://scholarships.gov.in/", 
                steps:"Register on Portal ➜ Fill Scheme Form ➜ Upload Documents ➜ Institute Verify",
                eligibility: "Indian Student ➜ Good Academic Record ➜ Family Income Limit",
                trigger: occ.includes("student") 
            },
            { 
                name:"Skill India (Free Training)", 
                link:"https://www.skillindia.gov.in/", 
                steps:"Search Desired Course ➜ Online Enrollment ➜ Complete Training ➜ Get Certified",
                eligibility: "Indian Citizen ➜ Age 15-35 ➜ Minimum Education required",
                trigger: occ.includes("student") || (age >= 18 && age < 35)
            },
            { 
                name:"PM Mudra Loan (Business Loan)", 
                link:"https://www.mudra.org.in/", 
                steps:"Prepare Business Plan ➜ Visit Nationalized Bank ➜ Submit Documents ➜ Get Loan",
                eligibility: "Micro/Small Business Owner ➜ Non-farm enterprise ➜ Good Credit Score",
                trigger: occ.includes("business") || occ.includes("self")
            },
            { 
                name:"MGNREGA (100 Days Work)", 
                link:"https://nrega.nic.in/", 
                steps:"Meet Gram Sevak ➜ Request Job Card ➜ Demand Work (when needed)",
                eligibility: "Rural Household ➜ Adults willing to do unskilled manual work",
                trigger: age >= 18 
            },
            { 
                name:"Ujjwala 2.0 (Free Gas)", 
                link:"https://www.pmuy.gov.in/", 
                steps:"Visit Gas Agency ➜ Submit KYC (Aadhaar/Ration Card) ➜ Get Free connection",
                eligibility: "Adult Woman ➜ BPL/Low Income Household ➜ No Existing Connection",
                trigger: gender === "Female" && income <= 200000 
            },
            { 
                name:"Old Age Pension", 
                link:"#", 
                steps:"Local Social Office ➜ Submit Age/Bank Proof ➜ BDO Verification",
                eligibility: "Indian Citizen ➜ Age 60+ ➜ Destitute/Low Income",
                trigger: age >= 60 
            }
        ];

        db.forEach(s => { if(s.trigger) eligible.push(s); });

        let html = `<div style='color:green; font-weight:bold; margin-bottom:15px; font-size:14px;'>✔ IDENTITY AUTHENTICATED</div><div class="scheme-list">`;
        eligible.forEach(s => {
            html += `
                <div class='scheme-card'>
                    <b>${s.name}</b>
                    <div class="info-box"><i>Process</i>${s.steps}</div>
                    <div class="info-box"><i>Eligibility</i>${s.eligibility}</div>
                    <a href="${s.link}" target="_blank">GO TO OFFICIAL SITE</a>
                </div>`;
        });
        document.getElementById("result").innerHTML = html + `</div>`;
    }
</script>
</body>
</html>
